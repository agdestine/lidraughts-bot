name: Run Bot 10 PM - 11 PM EST

on:
  schedule:
    # Run at 2 AM UTC (10 PM EST/9 PM EDT with daylight saving)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run bot for 1 hour
    - name: Setup and run bot upgrade
      run: |
        chmod +x ./scan_linux
        timeout 3600 python3 lidraughts-bot.py -u || true      
      env:
        LIDRAUGHTS_BOT_TOKEN: ${{ secrets.LIDRAUGHTS_BOT_TOKEN }}
