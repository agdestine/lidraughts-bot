name: Run Bot 10 PM - 11 PM EST

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Setup and run bot for 1 hour
      run: |
        chmod +x ./scan_linux
        timeout 36000 python3 lidraughts-bot.py || true      
      env:
        LIDRAUGHTS_BOT_TOKEN: ${{ secrets.LIDRAUGHTS_BOT_TOKEN }}
